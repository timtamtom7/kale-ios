name: Kale
options:
  bundleIdPrefix: com.kale
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

targets:
  Kale:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Widgets/**"
    resources:
      - path: Sources/Resources
        excludes:
          - "**/*.swift"
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kale.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ENABLE_PREVIEWS: "YES"
    dependencies:
      - package: SQLite
        product: SQLite
      - framework: EventKit.framework
        embed: false
    entitlements:
      path: Sources/Resources/Kale.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.kale.app

  KaleWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widgets
    settings:
      base:
        INFOPLIST_FILE: Sources/Widgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kale.app.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: "YES"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        CODE_SIGN_ENTITLEMENTS: Sources/Widgets/KaleWidget.entitlements
    dependencies:
      - target: Kale
        embed: false
    entitlements:
      path: Sources/Widgets/KaleWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.kale.app

  KaleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SourcesTests
    dependencies:
      - target: Kale
    settings:
      base:
        INFOPLIST_FILE: SourcesTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kale.app.tests
